name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  # ── Job 1 : lint + test (tous les push et PR) ────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (flake8)
        run: flake8 api/ dashboard/ tests/

      - name: Test (pytest + coverage)
        run: pytest tests/ -v --cov=api --cov-fail-under=75
        env:
          API_KEY: test-key

  # ── Job 2 : build & push vers ACR (main uniquement) ──────────────────────
  build:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-api:${{ github.sha }},${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-api:latest

      - name: Build & push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dashboard/Dockerfile
          push: true
          tags: ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-dashboard:${{ github.sha }},${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-dashboard:latest

  # ── Job 3 : déploiement sur Azure Container Apps (main uniquement) ────────
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Deploy API
        run: |
          az containerapp update \
            --name devops-monitor-api \
            --resource-group devops-monitor-rg \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-api:${{ github.sha }}

      - name: Deploy Dashboard
        run: |
          az containerapp update \
            --name devops-monitor-dashboard \
            --resource-group devops-monitor-rg \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-dashboard:${{ github.sha }}
